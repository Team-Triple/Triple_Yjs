name: Build and Push

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: docker build -t triple-yjs:test .

  publish_image:
    needs: test_build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        env:
          GHCR_IMAGE_SECRET: ${{ secrets.GHCR_IMAGE }}
          REPOSITORY: ${{ github.repository }}
        run: |
          IMAGE_NAME="$(echo "${GHCR_IMAGE_SECRET}" | xargs)"
          if [ -z "${IMAGE_NAME}" ]; then
            IMAGE_NAME="ghcr.io/$(echo "${REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          fi
          if [ -z "${IMAGE_NAME}" ]; then
            echo "IMAGE_NAME is empty"
            exit 1
          fi
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Using IMAGE_NAME=${IMAGE_NAME}"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:${{ github.sha }}
            ${{ steps.image.outputs.image_name }}:${{ github.ref_name }}
